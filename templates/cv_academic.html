<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Times New Roman", Times, serif;
    font-size: 10pt;
    color: #000;
    background: #fff;
    line-height: 1.6;
  }

  .page { width: 210mm; min-height: 297mm; padding: 16mm 18mm; }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 5mm;
    padding-bottom: 4mm;
    border-bottom: 1px solid #000;
  }

  .name {
    font-size: 20pt;
    font-weight: bold;
    color: #000;
    letter-spacing: 0.5px;
  }

  .role-label {
    font-size: 10pt;
    color: #333;
    margin-top: 1.5mm;
    font-style: italic;
  }

  .contact-row {
    font-size: 9pt;
    color: #444;
    margin-top: 3mm;
  }

  /* SECTION */
  .section { margin-bottom: 5mm; }

  .section-title {
    font-size: 11pt;
    font-weight: bold;
    color: #000;
    border-bottom: 1px solid #000;
    padding-bottom: 1mm;
    margin-bottom: 3.5mm;
    font-variant: small-caps;
    letter-spacing: 0.5px;
  }

  .summary { font-size: 10pt; color: #000; line-height: 1.7; text-align: justify; }

  /* Research interests */
  .research-interests {
    font-size: 9.5pt;
    color: #222;
    font-style: italic;
    margin-bottom: 3mm;
    line-height: 1.6;
  }

  /* Skills */
  .skills-table { width: 100%; border-collapse: collapse; }
  .skills-table td { vertical-align: top; padding: 1mm 2mm 1mm 0; font-size: 9.5pt; width: 50%; }
  .skill-group-label { font-weight: bold; color: #000; }
  .skill-values { color: #222; }

  /* Achievements */
  .achievements-table { width: 100%; border-collapse: collapse; }
  .achievements-table td { width: 50%; vertical-align: top; padding: 2mm 2mm 2mm 0; }

  .achievement-item {
    border-left: 2px solid #000;
    padding: 1.5mm 3mm;
    background: #f9f9f9;
    font-size: 9pt;
    line-height: 1.4;
    margin-right: 2mm;
  }

  .achievement-item strong {
    display: block;
    font-size: 8pt;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.5mm;
  }

  /* Experience / Academic positions */
  .job { margin-bottom: 5mm; }

  .job-header-table { width: 100%; border-collapse: collapse; margin-bottom: 1mm; }
  .job-header-table td { vertical-align: top; padding: 0; }

  .job-title { font-size: 10.5pt; font-weight: bold; color: #000; }
  .job-date { font-size: 9pt; color: #333; text-align: right; white-space: nowrap; font-style: italic; }
  .job-org { font-size: 10pt; color: #333; margin-bottom: 2mm; font-style: italic; }

  .job ul { list-style: none; padding-left: 0; }
  .job ul li {
    font-size: 9.5pt; color: #000; line-height: 1.6;
    margin-bottom: 1.5mm; padding-left: 5mm; text-indent: -5mm;
    text-align: justify;
  }
  .job ul li::before { content: "• "; color: #000; }

  /* Publications section */
  .publication {
    font-size: 9.5pt;
    color: #000;
    line-height: 1.6;
    margin-bottom: 3mm;
    padding-left: 5mm;
    text-indent: -5mm;
    text-align: justify;
  }

  .pub-title { font-style: italic; }
  .pub-journal { font-weight: bold; }

  /* Education */
  .edu-block { margin-bottom: 4mm; }

  .edu-header-table { width: 100%; border-collapse: collapse; }
  .edu-header-table td { vertical-align: top; padding: 0; }

  .edu-degree { font-size: 10.5pt; font-weight: bold; color: #000; }
  .edu-year-right { font-size: 9pt; color: #333; text-align: right; white-space: nowrap; font-style: italic; }
  .edu-school { font-size: 10pt; color: #333; font-style: italic; }
  .edu-detail { font-size: 9pt; color: #555; margin-top: 0.5mm; }

  /* Languages */
  .lang-row { font-size: 9.5pt; color: #000; margin-bottom: 1mm; }
  .lang-level { color: #555; font-style: italic; }

  /* Referees */
  .referees-note {
    font-size: 9pt;
    font-style: italic;
    color: #555;
    text-align: center;
    margin-top: 6mm;
    padding-top: 4mm;
    border-top: 1px solid #ccc;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="name">{{NAME}}</div>
    <div class="role-label">{{ROLE_LABEL}}</div>
    <div class="contact-row">{{CONTACT_ROW}}</div>
  </div>

  <div class="section">
    <div class="section-title">Research Statement</div>
    <div class="summary">{{SUMMARY}}</div>
  </div>

  {{ACHIEVEMENTS_BLOCK}}
  {{SKILLS_BLOCK}}

  <div class="section">
    <div class="section-title">Academic & Professional Experience</div>
    {{EXPERIENCE_BLOCK}}
  </div>

  {{EDUCATION_BLOCK}}
  {{LANGUAGES_BLOCK}}

  <div class="referees-note">References and publications available upon request.</div>

  {{EXTRA_SECTIONS}}

</div>
</body>
</html>
