<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 8pt;
    color: #1a1a1a;
    background: #fff;
    line-height: 1.4;
  }

  .page {
    width: 210mm;
    padding: 8mm 12mm 8mm 12mm;
  }

  /* HEADER */
  .header {
    display: table;
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 3mm;
    padding-bottom: 3mm;
    border-bottom: 2px solid #1a1a1a;
  }

  .header-left { display: table-cell; vertical-align: top; }
  .header-right { display: table-cell; vertical-align: top; text-align: right; width: 65mm; }

  .name {
    font-size: 19pt;
    font-weight: bold;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    line-height: 1.05;
  }

  .role-label { font-size: 8pt; color: #555; margin-top: 1mm; }
  .contact-item { font-size: 7.5pt; color: #555; margin-bottom: 1mm; }

  /* SECTION */
  .section { margin-bottom: 3mm; }

  .section-title {
    font-size: 6pt;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    background: #1a1a1a;
    padding: 1mm 2.5mm;
    margin-bottom: 2mm;
    display: block;
  }

  .summary { font-size: 8pt; color: #333; line-height: 1.5; }

  /* Skills */
  .skills-table { width: 100%; border-collapse: collapse; }
  .skills-table td { vertical-align: top; padding: 0.5mm 2mm 0.5mm 0; font-size: 7.5pt; width: 50%; }
  .skill-group-label { font-weight: bold; color: #1a1a1a; }
  .skill-values { color: #444; }

  /* Achievements */
  .achievements-table { width: 100%; border-collapse: collapse; }
  .achievements-table td { width: 50%; vertical-align: top; padding: 1mm 1.5mm 1mm 0; }

  .achievement-item {
    border-left: 2px solid #1a1a1a;
    padding: 1mm 2.5mm;
    background: #f7f7f7;
    font-size: 7.5pt;
    line-height: 1.3;
    margin-right: 1.5mm;
  }

  .achievement-item strong {
    display: block;
    font-size: 6.5pt;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.3mm;
  }

  /* Experience */
  .job { margin-bottom: 2.5mm; padding-bottom: 2mm; border-bottom: 1px solid #ebebeb; }
  .job:last-child { border-bottom: none; }

  .job-header-table { width: 100%; border-collapse: collapse; }
  .job-header-table td { vertical-align: top; padding: 0; }

  .job-title { font-size: 8.5pt; font-weight: bold; color: #1a1a1a; }
  .job-date { font-size: 7pt; color: #777; text-align: right; white-space: nowrap; }
  .job-org { font-size: 7.5pt; color: #555; margin-bottom: 1mm; font-style: italic; }

  .job ul { list-style: none; padding-left: 0; }
  .job ul li {
    font-size: 7.5pt; color: #333; line-height: 1.4;
    margin-bottom: 0.6mm; padding-left: 3.5mm; text-indent: -3.5mm;
  }
  .job ul li::before { content: "\25B8  "; color: #999; font-size: 6pt; }

  /* Education */
  .edu-block { margin-bottom: 1.5mm; display: table; width: 100%; }
  .edu-left { display: table-cell; vertical-align: top; }
  .edu-right { display: table-cell; vertical-align: top; text-align: right; white-space: nowrap; }
  .edu-degree { font-size: 8pt; font-weight: bold; color: #1a1a1a; }
  .edu-school { font-size: 7.5pt; color: #666; font-style: italic; }
  .edu-year { font-size: 7.5pt; color: #888; }

  /* Languages */
  .lang-row { font-size: 8pt; color: #444; margin-bottom: 0.8mm; display: inline; }
  .lang-row + .lang-row::before { content: "  ·  "; color: #bbb; }
  .lang-level { color: #999; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <div class="name">{{NAME}}</div>
      <div class="role-label">{{ROLE_LABEL}}</div>
    </div>
    <div class="header-right">{{CONTACT_BLOCK}}</div>
  </div>

  <div class="section">
    <div class="section-title">Summary</div>
    <div class="summary">{{SUMMARY}}</div>
  </div>

  {{ACHIEVEMENTS_BLOCK}}
  {{SKILLS_BLOCK}}

  <div class="section">
    <div class="section-title">Experience</div>
    {{EXPERIENCE_BLOCK}}
  </div>

  {{EDUCATION_BLOCK}}
  {{LANGUAGES_BLOCK}}

</div>
</body>
</html>
